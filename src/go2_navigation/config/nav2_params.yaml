amcl:
  ros__parameters:
    use_sim_time: false

    # ---- 坐标系与输入 ----
    base_frame_id: base
    global_frame_id: map
    odom_frame_id: odom
    scan_topic: scan
    tf_broadcast: true
    transform_tolerance: 1.0

    # ---- AMCL 基本模型 ----
    robot_model_type: nav2_amcl::DifferentialMotionModel
    laser_model_type: likelihood_field
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    lambda_short: 0.1
    sigma_hit: 0.2
    z_hit: 0.7
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.25

    # ---- 粒子与更新频率 ----
    min_particles: 1000
    max_particles: 5000
    pf_err: 0.05
    pf_z: 0.99
    resample_interval: 1
    recovery_alpha_fast: 0.1
    recovery_alpha_slow: 0.001
    update_min_d: 0.1
    update_min_a: 0.02
    max_beams: 180
    laser_likelihood_max_dist: 4.0
    laser_max_range: 100.0
    laser_min_range: -1.0

    # ---- 启动时给一组默认位姿,RViz 里仍建议重新 2D Pose Estimate ----
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0
    save_pose_rate: 0.5

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    default_nav_to_pose_bt_xml: "/home/bakamake/.local/share/miniforge3/envs/ros_humble/share/nav2_bt_navigator/behavior_trees/navigate_w_replanning_only_if_path_becomes_invalid.xml"
